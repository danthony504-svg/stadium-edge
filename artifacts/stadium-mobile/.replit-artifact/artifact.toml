kind = "mobile"
previewPath = "/mobile/"
title = "Stadium Edge"
version = "1.0.0"
id = "artifacts/stadium-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22502

[services.development]
run = "pnpm --filter @workspace/stadium-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stadium-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/stadium-mobile", "run", "serve" ]

[services.env]
PORT = "22502"
BASE_PATH = "/mobile/"
